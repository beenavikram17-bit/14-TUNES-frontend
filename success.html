<!DOCTYPE html>
<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>
14 TUNES | Registration Successful
</title>



<meta name="description"
content="Registration successful page for 14 TUNES casting applications.">



<link rel="stylesheet" href="style/success.css">

<link rel="stylesheet" href="responsive.css">



</head>





<body>



<div class="success-box">





    <div class="check">

        ✓

    </div>







    <h1 class="success-title">

        Registration Successful

    </h1>







    <div class="candidate-box">

        <p id="candidateName">

        </p>

    </div>







    <h2>

        14 TUNES CASTING

    </h2>







    <p>

        Thank you for registering for our short film casting.

        <br>

        Our team will review your details and contact you soon.

    </p>







    <p class="tagline">

        "A Promise Never Dies" 🎬

    </p>







    <a href="home.html" class="back-home">

        ← Back to Home

    </a>





</div>








<script>


const name = localStorage.getItem("castName");



const candidateElement =
document.getElementById("candidateName");



if(name){


candidateElement.innerHTML =

`
Dear <span>${name}</span>,
<br>
your registration has been received successfully.
`;



}

else{


candidateElement.innerHTML =

`
Your registration has been received successfully.
`;



}



</script>






</body>


</html>
