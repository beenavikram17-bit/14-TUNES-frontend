<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        14 TUNES Casting Register
    </title>


    <link rel="stylesheet" href="responsive.css">

    <link rel="stylesheet" href="style/register.css">

</head>



<body>



<div class="register-box">



    <a href="home.html" class="back-home">

        ← Back to Home

    </a>





    <h2>
        14 TUNES CASTING
    </h2>






    <form id="castingForm">





        <input

        type="text"

        id="name"

        placeholder="Enter Name"

        required>







        <input

        type="number"

        id="age"

        placeholder="Enter Age"

        required>







        <select id="gender" required>


            <option value="">

                Select Gender

            </option>


            <option>

                Male

            </option>


            <option>

                Female

            </option>


        </select>








        <select id="role" required>



            <option value="">

                Select Role

            </option>



            <option>

                Lead Actor

            </option>



            <option>

                Lead Actress

            </option>



            <option>

                Supporting Actor

            </option>



            <option>

                Supporting Actress

            </option>



        </select>









        <input

        type="tel"

        id="phone"

        placeholder="Phone Number"

        required>









        <textarea

        id="address"

        placeholder="Address"

        required></textarea>









        <button type="submit">

            Submit

        </button>





    </form>





</div>







<script src="js/register.js"></script>


</body>


</html>
