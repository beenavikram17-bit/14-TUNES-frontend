<!-- SETTINGS CONTENT -->


<div class="admin-box settings-box">





<a href="home.html" class="back-home">

← Back to Home

</a>







<h1>

⚙️ Admin Settings

</h1>







<!-- ADMIN PROFILE -->


<div class="settings-card">



<h2>

Admin Profile

</h2>




<label>

Admin Name

</label>



<input

type="text"

id="adminName"

placeholder="Enter Admin Name">







<label>

Email

</label>



<input

type="email"

id="adminEmail"

placeholder="Enter Email">







<button id="saveProfile">

Save Profile

</button>



</div>









<!-- PASSWORD CHANGE -->


<div class="settings-card">



<h2>

Change Password

</h2>





<label>

Current Password

</label>


<input

type="password"

id="oldPassword"

placeholder="Current Password">






<label>

New Password

</label>


<input

type="password"

id="newPassword"

placeholder="New Password">







<button id="changePassword">

Update Password

</button>



</div>









<!-- WEBSITE SETTINGS -->


<div class="settings-card">



<h2>

Website Control

</h2>




<label>

Website Status

</label>




<select id="siteStatus">


<option>

Active

</option>


<option>

Maintenance

</option>


</select>






<button id="saveWebsite">

Save Settings

</button>



</div>







</div>
