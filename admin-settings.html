<body>



<!-- LOGIN CHECK -->

<script>

if(localStorage.getItem("adminLogin") !== "true"){

window.location.href="admin-login.html";

}

</script>







<!-- MOBILE MENU -->


<button class="menu-btn" id="menuBtn">

☰

</button>






<div class="sidebar-overlay" id="overlay"></div>


<!-- SIDEBAR -->

<aside
class="admin-sidebar"
id="sidebar">


<div class="logo">

<h1>
14 TUNES
</h1>

<p>
ADMIN PANEL
</p>

</div>





<nav>


<a href="admin.html">

🏠 Dashboard

</a>




<a href="admin-contact.html">

📩 Contact Messages

</a>

class="active">

</a>





<a href="#"
onclick="logout();return false;">

🚪 Logout

</a>



</nav>


</aside>








<!-- SETTINGS CONTENT -->


<main class="admin-box settings-box">





<a href="home.html" class="back-home">

← Back to Home

</a>







<h1>

⚙️ Admin Settings

</h1>








<!-- ADMIN PROFILE -->



<div class="settings-card">


<h2>

Admin Profile

</h2>




<label>

Admin Name

</label>


<input

type="text"

id="adminName"

placeholder="Enter Admin Name">






<label>

Email

</label>



<input

type="email"

id="adminEmail"

placeholder="Enter Email">






<button id="saveProfile">

Save Profile

</button>



</div>









<!-- PASSWORD -->



<div class="settings-card">


<h2>

Change Password

</h2>





<label>

Current Password

</label>


<input

type="password"

id="oldPassword"

placeholder="Current Password">





<label>

New Password

</label>


<input

type="password"

id="newPassword"

placeholder="New Password">






<button id="changePassword">

Update Password

</button>



</div>








<!-- WEBSITE CONTROL -->


<div class="settings-card">



<h2>

Website Control

</h2>





<label>

Website Status

</label>






<select id="siteStatus">


<option>

Active

</option>


<option>

Maintenance

</option>


</select>







<button id="saveWebsite">

Save Settings

</button>




</div>







</main>








<script src="js/admin-settings.js"></script>

<script src="js/admin.js"></script>



</body>

</html>
